name: ax_layer_shell
description: Wayland wlr-layer-shell support for Flutter Linux desktop apps.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.12.0
  flutter: ">=3.19.0"

flutter:
  plugin:
    platforms:
      linux:
        pluginClass: AxLayerShellPlugin

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
